<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Super Trunfo - Dia 8</title>
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <html>

    <head>
        <title>
            Jogo Poderes das Cartas
        </title>
    </head>

    <body>
        <div class="container">

            <h1 class="page-title">Jogo Poderes das Cartas</h1>

            <div id="placar" class="placar">Jogador: 0 | Computador: 0</div>

            <button onclick="sortearCarta()" id="btnSortear">Sortear carta</button>

            <form id="form">
                <h2>Escolha o seu atributo</h2>
                <div class="wrapper">
                    <div>
                        <div id="carta-jogador">
                            <img src="https://www.alura.com.br/assets/img/imersoes/dev-2021/card-super-trunfo-transparent-ajustado.png"
                                style=" width: inherit; height: inherit; position: absolute;">
                            <h3></h3>
                        </div>
                    </div>
                    <div>
                        <div id="carta-maquina" class="carta"><img
                                src="https://www.alura.com.br/assets/img/imersoes/dev-2021/card-super-trunfo-transparent-ajustado.png"
                                style=" width: inherit; height: inherit; position: absolute;"></div>
                    </div>
                </div>
                <button class="button-jogar" type="button" id="btnJogar" onclick="jogar()" disabled>
                    Jogar
                </button>

                <button class="button-jogar" type="button" id="btnJogarNovamente" onclick="jogarNovamente()" disabled>
                    Jogar novamente
                </button>

                <div id="resultado"></div>
            </form>
        </div>
    </body>

    </html>
    <script src="./script.js"></script>

</body>

</html>
